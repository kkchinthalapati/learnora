<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnora Frontend Implementation Plan</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #e2e8f0;
            background-color: #0f172a;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1, h2, h3 { color: #38bdf8; }
        h1 { border-bottom: 2px solid #334155; padding-bottom: 10px; }
        h2 { margin-top: 35px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        code { background-color: #1e293b; color: #f472b6; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        pre { background-color: #1e293b; padding: 15px; border-radius: 6px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; margin: 15px 0; background: #1e293b; border-radius: 6px; overflow: hidden; }
        th, td { border: 1px solid #334155; padding: 10px 14px; text-align: left; }
        th { background-color: #0f172a; color: #38bdf8; }
        blockquote { border-left: 4px solid #38bdf8; padding-left: 15px; color: #94a3b8; margin: 15px 0; }
        hr { border: none; border-top: 1px solid #334155; margin: 30px 0; }
    </style>
</head>
<body>
    <div id="content">Loading plan...</div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('./implementationplan1.md')
            .then(res => res.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = "<p>Error loading plan. Please open <code>implementationplan1.md</code> directly.</p>";
            });
    </script>
</body>
</html>
