<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
        />
        <title>Verified | Learnora</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: #f8fafc;
                text-align: center;
                margin: 0;
            }
            .box {
                padding: 40px;
                background: white;
                border-radius: 20px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
                max-width: 400px;
                border: 1px solid rgba(148, 163, 184, 0.2);
            }
            h1 {
                color: #6366f1;
                margin-bottom: 12px;
                font-weight: 800;
                font-size: 28px;
                letter-spacing: -0.5px;
            }
            p {
                color: #1e293b;
                opacity: 0.8;
                font-weight: 500;
                line-height: 1.5;
                margin-bottom: 24px;
            }
            .spinner {
                width: 30px;
                height: 30px;
                border: 4px solid #f3f3f3;
                border-top: 4px solid #6366f1;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>Account Verified!</h1>
            <p>
                Your email has been securely confirmed. Taking you to your
                dashboard now...
            </p>
            <div class="spinner"></div>
        </div>
        <script src="verify.js"></script>
    </body>
</html>
