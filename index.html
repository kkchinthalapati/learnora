<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Study Dashboard</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <nav class="sidebar">
            <h2>StudyApp</h2>
            <ul class="nav-links">
                <li class="active" onclick="switchTab('exams', this)">
                    📚 Exams
                </li>
                <li onclick="switchTab('timer', this)">⏱️ Study Timer</li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <h1 id="page-title">Upcoming Exams</h1>
                <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
            </header>

            <section
                id="exams-section"
                class="tab-content"
                style="display: block"
            >
                <p id="affirmation-box"></p>
                <div class="progress-container">
                    <div id="progress-fill"></div>
                </div>

                <div class="input-card">
                    <input
                        type="text"
                        id="subject"
                        placeholder="Subject name..."
                    />
                    <input type="date" id="examDate" />
                    <select id="level">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                    <button onclick="addExam()">Add</button>
                </div>

                <div
                    id="empty-state"
                    style="
                        display: none;
                        color: var(--text-color);
                        opacity: 0.6;
                    "
                >
                    No exams yet! Add one above to start grinding.
                </div>
                <ul id="examList" class="exam-grid"></ul>
            </section>

            <section
                id="timer-section"
                class="tab-content"
                style="display: none"
            >
                <div class="timer-card">
                    <h2 id="time-display">25:00</h2>
                    <p id="cycle-status">Ready to focus</p>
                    <div class="timer-controls">
                        <button onclick="startTimer()">Start</button>
                        <button
                            onclick="pauseTimer()"
                            style="background-color: #ff9f43"
                        >
                            Pause
                        </button>
                        <button
                            onclick="resetTimer()"
                            style="background-color: #ff4757"
                        >
                            Reset
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
