<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StudyApp</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div
            id="auth-wall"
            style="
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                gap: 10px;
            "
        >
            <h2>StudyApp Login</h2>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <div>
                <button onclick="handleLogin()">Login</button>
                <button onclick="handleSignup()">Sign Up</button>
            </div>
        </div>

        <div id="main-app" style="display: none">
            <nav class="sidebar" id="sidebar">
                <h2 class="brand">StudyApp</h2>
                <ul class="nav-links">
                    <li class="active" onclick="switchTab('logs', this)">
                        📊 Dashboard
                    </li>
                    <hr class="sidebar-divider" />
                    <li onclick="switchTab('timer', this)">⏱️ Timer</li>
                    <li onclick="switchTab('todo', this)">📝 To-Do List</li>
                    <li onclick="switchTab('exams', this)">📚 Exams</li>
                </ul>
            </nav>

            <main class="main-content">
                <header>
                    <div class="header-left">
                        <button id="menu-toggle" onclick="toggleSidebar()">
                            ☰
                        </button>
                        <h1 id="page-title">Dashboard</h1>
                    </div>
                    <div class="header-right">
                        <span id="live-clock">00:00</span>
                        <button
                            id="theme-toggle"
                            onclick="toggleTheme()"
                            aria-label="Toggle Theme"
                        >
                            <svg
                                id="theme-icon"
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"
                                ></path>
                            </svg>
                        </button>
                    </div>
                </header>

                <section
                    id="logs-section"
                    class="tab-content"
                    style="display: block"
                >
                    <div class="glass-panel">
                        <h2>Session History</h2>
                        <p>
                            All completed focus blocks are logged here
                            automatically.
                        </p>
                    </div>
                    <ul id="log-list" class="list-container"></ul>
                </section>

                <section
                    id="timer-section"
                    class="tab-content"
                    style="display: none"
                ></section>

                <section
                    id="todo-section"
                    class="tab-content"
                    style="display: none"
                >
                    <div class="input-card glass-panel">
                        <input
                            type="text"
                            id="todo-input"
                            placeholder="Add a new task..."
                            onkeypress="handleTodoEnter(event)"
                        />
                        <button onclick="addTodo()">Add Task</button>
                    </div>
                    <ul id="todo-list" class="list-container"></ul>
                </section>

                <section
                    id="exams-section"
                    class="tab-content"
                    style="display: none"
                ></section>
            </main>
        </div>
        <script type="module" src="script.js"></script>
    </body>
</html>
